[pytest]
# =============================================================================
# pytest 配置文件
# =============================================================================
# 注意：以下配置忽略了部分警告，原因如下：
#
# 1. -p no:warnings 禁用警告插件输出
#    原因：测试中存在 3 类第三方库弃用警告，这些不是项目代码问题：
#    - lark_oapi/websockets: 使用了已弃用的 websockets API (websockets>=14.0 移除旧 API)
#    - urllib3/brotli: Brotli 版本检测警告 (需要 Brotli>=1.2.0)
#    - RuntimeWarning: 测试环境中异步事件循环特殊处理导致的警告
#
#    这些警告：
#    - 不影响测试功能和结果
#    - 不是项目代码可以修复的（依赖第三方库更新）
#    - 已在项目中通过代码优化尽量减少（如 event_handlers 异步处理）
# =============================================================================

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 单线程运行，避免内存不足
addopts = -v --tb=short -p no:warnings

# asyncio 配置
asyncio_mode = auto

# 限制并发（避免单核服务器过载）
asyncio_default_fixture_loop_scope = function

# 禁用并行测试（确保单线程）
workers = 0